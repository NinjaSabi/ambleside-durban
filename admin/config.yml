backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

site_url: https://amblesidedurban.com
display_url: https://amblesidedurban.com
logo_url: /images/logo-nav.jpg

collections:
  # NEWS POSTS
  - name: "news"
    label: "News Posts"
    label_singular: "News Post"
    folder: "_content/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Author", name: "author", widget: "string", default: "Ambleside Staff" }
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - { label: "Image Alt Text", name: "image_alt", widget: "string", required: false }
      - { label: "Summary (shown on news listing)", name: "summary", widget: "text", hint: "2-3 sentences. Shown on the news index page." }
      - { label: "Body", name: "body", widget: "markdown" }
      - { label: "SEO Meta Description", name: "meta_description", widget: "string", hint: "150-160 characters for Google", required: false }

  # EVENTS — managed via Google Calendar (see events/index.html)
  # No CMS collection needed here

  # TEAM MEMBERS
  - name: "team"
    label: "Our Team"
    label_singular: "Team Member"
    folder: "_content/team"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Name", name: "title", widget: "string" }
      - { label: "Role / Title", name: "role", widget: "string" }
      - { label: "Department", name: "department", widget: "select", options: ["Leadership", "Junior School", "Preschool — Acorns", "Administration", "Support Staff"] }
      - { label: "Photo", name: "image", widget: "image", required: false }
      - { label: "Short Bio", name: "body", widget: "markdown", hint: "2-4 sentences." }
      - { label: "Sort Order", name: "order", widget: "number", default: 99 }

  # TESTIMONIALS
  - name: "testimonials"
    label: "Testimonials"
    label_singular: "Testimonial"
    folder: "_content/testimonials"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Quote", name: "quote", widget: "text" }
      - { label: "Author", name: "author", widget: "string", hint: "e.g. Parent — Grade 3 Student" }
      - { label: "Featured?", name: "featured", widget: "boolean", default: false, hint: "Show on Home page" }
      - { label: "Sort Order", name: "order", widget: "number", default: 99 }
